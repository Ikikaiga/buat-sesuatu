<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome flow with modern Neomorphism design">
    <title>Welcome - Neomorphism</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Global Liquid Glass Background -->
    <div class="liquid-bg-shape shape-1"></div>
    <div class="liquid-bg-shape shape-2"></div>
    <div class="liquid-bg-shape shape-3"></div>
    <div class="liquid-glass-overlay"></div>

    <div class="app">

        <div class="page active" id="page1">
            <div class="card">
                <div class="page1-content">
                    <div class="logo-circle">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                    </div>
                    <h1 class="page1-title">Siap Memulai?</h1>
                    <p class="page1-subtitle">Tekan tombol di bawah untuk masuk</p>
                    <button class="btn-primary btn-start" id="btnStart" onclick="goToPage(2)">
                        Masuk
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                            <path d="M5 12h14"/>
                            <path d="m12 5 7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="page" id="page2">
            <div class="card">
                <div class="page2-content">
                    <h2 class="page2-title">Selamat Datang!</h2>
                    <p class="page2-subtitle">Isi namamu di bawah</p>
                    <div class="input-group">
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <input type="text" id="nameInput" placeholder="Ketik namamu..." autocomplete="off" maxlength="30">
                        </div>
                        <div class="error-text" id="nameError"></div>
                    </div>
                    <button class="btn-primary btn-next" id="btnNext" onclick="submitName()">
                        Lanjut
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                            <path d="M5 12h14"/>
                            <path d="m12 5 7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="page" id="page3">
            <div class="card card-wide">
                <div class="page3-content">
                    <h1 class="page3-greeting">Halo, <span id="displayName"></span> 🎉</h1>
                    <p class="page3-subtitle">Pilih menu yang kamu inginkan</p>
                    <div class="options-grid">
                        <div class="option-card" onclick="showToast('Chat belum tersedia', 'info')">
                            <div class="option-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                                </svg>
                            </div>
                            <span class="option-label">Chat</span>
                            <span class="option-badge">Segera</span>
                        </div>
                        <div class="option-card" onclick="openCamera()">
                            <div class="option-icon icon-camera">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                                    <circle cx="12" cy="13" r="3"/>
                                </svg>
                            </div>
                            <span class="option-label">Kamera</span>
                            <svg class="option-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                <path d="m9 18 6-6-6-6"/>
                            </svg>
                        </div>
                        <div class="option-card" onclick="showToast('Pengaturan belum tersedia', 'info')">
                            <div class="option-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3"/>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                                </svg>
                            </div>
                            <span class="option-label">Pengaturan</span>
                            <span class="option-badge">Segera</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="page" id="page4">
            <div class="fullscreen-camera">
                <video id="cameraVideo" autoplay playsinline></video>
                <canvas id="cameraCanvas"></canvas>

                <div class="camera-overlay top-bar">
                    <div class="top-left-actions">
                        <button class="btn-back-floating" onclick="closeCamera()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
                                <path d="m15 18-6-6 6-6"/>
                            </svg>
                        </button>
                        <button class="btn-ascii-floating" id="btnAscii" onclick="toggleAsciiMode()">ASCII</button>
                    </div>
                </div>

                <div class="camera-overlay bottom-bar">
                    <div class="zoom-wrapper">
                        <span class="zoom-text">1x</span>
                        <input type="range" id="zoomSlider" class="zoom-slider" min="1" max="3" step="0.1" value="1">
                        <span class="zoom-text">3x</span>
                    </div>

                    <div class="mode-toggle">
                        <div class="mode-slider" id="modeSlider"></div>
                        <button class="mode-btn active" id="btnModeVideo" onclick="switchMode('video')">Video</button>
                        <button class="mode-btn" id="btnModePhoto" onclick="switchMode('photo')">Foto</button>
                    </div>

                    <button class="btn-record-circle" id="btnRecord" onclick="handleCapture()">
                        <span class="record-icon-inner" id="recordIconInner"></span>
                    </button>
                    <span id="recordText" style="display: none;">Rekam Video</span>
                </div>

                <!-- Screen flash for photo capture -->
                <div class="screen-flash" id="screenFlash"></div>

                <div class="camera-loading" id="cameraLoading">
                    <div class="loader-ring"></div>
                    <p>Memuat kamera & model...</p>
                </div>

                <div class="camera-error" id="cameraError" style="display:none;">
                    <p>❌ Gagal mengakses kamera</p>
                    <button class="btn-retry" onclick="initCamera()">Coba Lagi</button>
                </div>
            </div>
        </div>

    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
